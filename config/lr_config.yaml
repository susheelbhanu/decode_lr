# NOTE
#   Do NOT push user-specific changes to the repository!
#   Change settings tagged with "USER_INPUT" before using this file.

##################################################
# STEPS

# Steps to be done
# steps: ["profiles", "lr_assembly", "lr_mags", "analysis"] # USER_INPUT
steps: ["lr_assembly"]

##################################################
# INPUT

# dataset tag/name (will be used for some file/folder names)
tag: "skyline_lr"

# working directory (will include links to raw data, logs, results)
workdir: "/ei/projects/5/542de014-1e71-4955-945a-5d2ab09567a7/scratch/susbus/analysis" # USER_INPUT

# internal databases (created by the pipeline; external databases should be defined elsewhere)
dbsdir: "/ei/.project-scratch/0/0e51ef86-0156-4e79-ad12-c5411c0a5496/databases" # USER_INPUT (do NOT change if on EI-HPC)

# samples (if a relative path, relative to this repo)
samples: "config/skyline_samples.tsv" # USER_INPUT

# path to the metadata (if a relative path, relative to this repo)
metadata: "data" # USER_INPUT

# path to the results folder
results_dir: "/ei/projects/5/542de014-1e71-4955-945a-5d2ab09567a7/CEH_soil_project/lr_results"

# path to the envs folder
env_dir: "/ei/projects/5/542de014-1e71-4955-945a-5d2ab09567a7/CEH_soil_project/decode_lr/envs"

# other directories
log_dir: "/ei/projects/5/542de014-1e71-4955-945a-5d2ab09567a7/CEH_soil_project/lr_results/logs"
benchmark_dir: "/ei/projects/5/542de014-1e71-4955-945a-5d2ab09567a7/CEH_soil_project/lr_results/benchmarks"

# --- Input Files ---
hifi_dir: "/ei/projects/5/542de014-1e71-4955-945a-5d2ab09567a7/CEH_soil_project/HiFi"
ont_file: "/ei/projects/5/542de014-1e71-4955-945a-5d2ab09567a7/CEH_soil_project/ONT/CEHSoil_sup_basecalled/CEH_Soil/CEHSoil_ONT_filtered_trimmed.fastq.gz"

# --- File Naming Pattern ---
# !!! ADJUST AS NEEDED !!!
hifi_file_pattern: "{sample}/{sample}_trimmed.fastq.gz" 

# --- Sample Lists ---
samples:
  bulk:
    - "b10_d3_0200_con"
    - "b10_d3_1400_con"
    - "b20_d3_0200_bio"
    - "b20_d3_1400_bio"
    - "b26_t3_con"
  rhizo:
    - "r15_d3_0200_con"
    - "r15_d3_1400_con"
    - "r30_d3_0200_bio"
    - "r30_d3_1400_bio"

# Special sample from the bulk list for hybrid assembly
hybrid_individual_sample: "b26_t3_con"

# --- Tool Parameters ---
metamdbg:
  threads: 48
  mem_gb: 1000 
  k_min: 15
  k_max: 27
  opts: "" # E.g., "--min-depth 2"

minimap2:
  threads: 16
  hifi_preset: "-ax map-hifi"
  ont_preset: "-ax map-ont"

samtools:
  threads: 16

metabat2:
  min_contig_length: 2000
  opts: "--unbinned" 

# --- Resource Allocation (Example for Slurm, adjust as needed) ---
# These are placeholders, modify for your cluster or remove if running locally
resources:
  default_mem_mb: 6000
  default_time: "08:00:00"
  default_partition: "ei-long"
  metamdbg_mem_mb: 100000 # Corresponds to mem_gb above
  metamdbg_time: "96:00:00"
  metabat2_mem_mb: 64000
  metabat2_time: "48:00:00"

