$schema: "http://json-schema.org/draft-07/schema#"
title: "Long-read metagenome config"

type: object
properties:
  hifi_dir:
    type: string
  ont_file:
    type: string
  samples:
    type: object
    properties:
      bulk:
        type: array
        items: { type: string }
      rhizo:
        type: array
        items: { type: string }
    required: [bulk, rhizo]
  hybrid_individual_sample:
    type: string
required: [hifi_dir, ont_file, samples, hybrid_individual_sample]
additionalProperties: true
