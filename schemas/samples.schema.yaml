$schema: "http://json-schema.org/draft-07/schema#"
title: sample table

type: object
properties:
  Sample_ID:
    type: string
    pattern: "^[A-Za-z0-9_-]+$"
    description: sample ID

  sR1:
    type: [string, "null"]
    description: Absolute path to short read R1 FASTQ file
    # Accept either the original fastq naming OR your current raw layout
    pattern: "^(.*/metag/fastq/[A-Za-z0-9_-]+_DNA_(S[0-9]+)+_R1_[0-9]+\\.fastq\\.gz|.*/metag/raw/[A-Za-z0-9_-]+/[A-Za-z0-9_-]+_R1\\.fastq\\.gz)$"

  sR2:
    type: [string, "null"]
    description: Absolute path to short read R2 FASTQ file
    pattern: "^(.*/metag/fastq/[A-Za-z0-9_-]+_DNA_(S[0-9]+)+_R2_[0-9]+\\.fastq\\.gz|.*/metag/raw/[A-Za-z0-9_-]+/[A-Za-z0-9_-]+_R2\\.fastq\\.gz)$"

  long_reads:
    type: [string, "null"]
    description: Absolute path to long read R1 FASTQ file
    # Fix unmatched parenthesis; make it optional and separate tree if you use long reads later
    pattern: "^.*/long_reads/fastq/[A-Za-z0-9_-]+_long_(S[0-9]+)+_R1_[0-9]+\\.fastq\\.gz$"

  group:             # <- match your TSV heading (lowercase)
    type: string
    pattern: "^[A-Za-z0-9_-]+$"
    description: sample grouping

required:
  - Sample_ID
  - sR1
  - sR2
  - group
