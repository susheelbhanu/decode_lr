$schema: "http://json-schema.org/draft-07/schema#"

title: "Main Snakemake Configuration Schema"
description: "Schema defining the required structure and types for the main configuration file used in this workflow."

type: object
properties:
  tag:
    type: string
    description: "A short identifier or tag for this workflow run (e.g., project name or version)."

  workdir:
    type: string

  resultsdir:
    type: string

  dbsdir:
    type: string

  samples:
    description: "Either a path to a sample table file OR an inline object with bulk/rhizo arrays."
    oneOf:
      # Option 1: external file path
      - type: string
        pattern: "^/.+|^[^/].+$"   # any non-empty path
      # Option 2: inline lists as used in your config
      - type: object
        properties:
          bulk:
            type: array
            minItems: 1
            items:
              type: string
              pattern: "^[A-Za-z0-9._-]+$"
          rhizo:
            type: array
            minItems: 1
            items:
              type: string
              pattern: "^[A-Za-z0-9._-]+$"
        required: [bulk, rhizo]
        additionalProperties: false
